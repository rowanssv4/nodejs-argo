<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>登录 / 注册</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(96, 165, 250, 0.35), transparent 32%),
        radial-gradient(circle at bottom right, rgba(168, 85, 247, 0.28), transparent 35%),
        linear-gradient(135deg, #0f172a, #111827);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #e5e7eb;
      padding: 24px;
    }

    .container {
      width: 100%;
      max-width: 920px;
      min-height: 560px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      background: rgba(15, 23, 42, 0.72);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 30px 100px rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(18px);
    }

    .left {
      padding: 48px;
      background:
        linear-gradient(135deg, rgba(59, 130, 246, 0.24), rgba(147, 51, 234, 0.18)),
        rgba(255, 255, 255, 0.04);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: relative;
      overflow: hidden;
    }

    .left::before {
      content: "";
      position: absolute;
      width: 260px;
      height: 260px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.12);
      top: -90px;
      right: -90px;
    }

    .brand {
      position: relative;
      z-index: 1;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.4px;
    }

    .intro {
      position: relative;
      z-index: 1;
    }

    .intro h1 {
      font-size: 42px;
      line-height: 1.15;
      margin-bottom: 18px;
    }

    .intro p {
      max-width: 360px;
      color: #cbd5e1;
      line-height: 1.8;
      font-size: 15px;
    }

    .tips {
      position: relative;
      z-index: 1;
      font-size: 14px;
      color: #bfdbfe;
    }

    .right {
      padding: 42px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .tabs {
      display: flex;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      padding: 5px;
      margin-bottom: 32px;
    }

    .tab {
      flex: 1;
      border: none;
      border-radius: 12px;
      padding: 12px;
      cursor: pointer;
      color: #cbd5e1;
      background: transparent;
      font-size: 15px;
      transition: 0.25s;
    }

    .tab.active {
      color: #0f172a;
      background: #e5e7eb;
      font-weight: 700;
    }

    .form {
      display: none;
      animation: fade 0.35s ease;
    }

    .form.active {
      display: block;
    }

    @keyframes fade {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .form h2 {
      font-size: 28px;
      margin-bottom: 8px;
    }

    .form .desc {
      color: #94a3b8;
      margin-bottom: 28px;
      font-size: 14px;
    }

    .field {
      margin-bottom: 18px;
    }

    .field label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      color: #cbd5e1;
    }

    .field input {
      width: 100%;
      padding: 14px 15px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.07);
      color: #f8fafc;
      outline: none;
      font-size: 15px;
      transition: 0.25s;
    }

    .field input::placeholder {
      color: #64748b;
    }

    .field input:focus {
      border-color: rgba(96, 165, 250, 0.8);
      box-shadow: 0 0 0 4px rgba(96, 165, 250, 0.14);
      background: rgba(255, 255, 255, 0.1);
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 6px 0 22px;
      font-size: 14px;
      color: #94a3b8;
    }

    .row a,
    .switch-text button {
      color: #93c5fd;
      text-decoration: none;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 14px;
    }

    .checkbox {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .submit {
      width: 100%;
      border: none;
      border-radius: 15px;
      padding: 14px 18px;
      background: linear-gradient(135deg, #60a5fa, #a78bfa);
      color: #ffffff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.25s;
      box-shadow: 0 12px 30px rgba(96, 165, 250, 0.25);
    }

    .submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 18px 40px rgba(96, 165, 250, 0.35);
    }

    .switch-text {
      margin-top: 22px;
      text-align: center;
      color: #94a3b8;
      font-size: 14px;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 24px 0;
      color: #64748b;
      font-size: 13px;
    }

    .divider::before,
    .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: rgba(255, 255, 255, 0.12);
    }

    .social {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .social button {
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.06);
      color: #e5e7eb;
      border-radius: 14px;
      padding: 12px;
      cursor: pointer;
      transition: 0.25s;
    }

    .social button:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    @media (max-width: 760px) {
      .container {
        grid-template-columns: 1fr;
      }

      .left {
        padding: 34px;
        min-height: 260px;
      }

      .intro h1 {
        font-size: 32px;
      }

      .right {
        padding: 34px;
      }
    }

    @media (max-width: 430px) {
      body {
        padding: 14px;
      }

      .left,
      .right {
        padding: 26px;
      }

      .social {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

  <main class="container">
    <section class="left">
      <div class="brand">Cloud Account</div>

      <div class="intro">
        <h1>欢迎回来</h1>
        <p>
          这是一个简洁的登录和注册示例页面，适合用于静态网站、前端练习或项目原型展示。
        </p>
      </div>

      <div class="tips">安全、简洁、响应式设计</div>
    </section>

    <section class="right">
      <div class="tabs">
        <button class="tab active" onclick="showForm('login')">登录</button>
        <button class="tab" onclick="showForm('register')">注册</button>
      </div>

      <form class="form active" id="loginForm">
        <h2>登录账号</h2>
        <p class="desc">请输入你的账号信息继续访问。</p>

        <div class="field">
          <label for="loginEmail">邮箱</label>
          <input id="loginEmail" type="email" placeholder="example@mail.com" required />
        </div>

        <div class="field">
          <label for="loginPassword">密码</label>
          <input id="loginPassword" type="password" placeholder="请输入密码" required />
        </div>

        <div class="row">
          <label class="checkbox">
            <input type="checkbox" />
            记住我
          </label>
          <a href="#">忘记密码？</a>
        </div>

        <button class="submit" type="submit">立即登录</button>

        <div class="divider">或</div>

        <div class="social">
          <button type="button">Google</button>
          <button type="button">GitHub</button>
        </div>

        <p class="switch-text">
          还没有账号？
          <button type="button" onclick="showForm('register')">立即注册</button>
        </p>
      </form>

      <form class="form" id="registerForm">
        <h2>创建账号</h2>
        <p class="desc">填写以下信息即可创建一个新账号。</p>

        <div class="field">
          <label for="registerName">用户名</label>
          <input id="registerName" type="text" placeholder="请输入用户名" required />
        </div>

        <div class="field">
          <label for="registerEmail">邮箱</label>
          <input id="registerEmail" type="email" placeholder="example@mail.com" required />
        </div>

        <div class="field">
          <label for="registerPassword">密码</label>
          <input id="registerPassword" type="password" placeholder="至少 8 位字符" required />
        </div>

        <div class="field">
          <label for="confirmPassword">确认密码</label>
          <input id="confirmPassword" type="password" placeholder="再次输入密码" required />
        </div>

        <div class="row">
          <label class="checkbox">
            <input type="checkbox" required />
            同意用户协议
          </label>
        </div>

        <button class="submit" type="submit">创建账号</button>

        <p class="switch-text">
          已经有账号？
          <button type="button" onclick="showForm('login')">返回登录</button>
        </p>
      </form>
    </section>
  </main>

  <script>
    const tabs = document.querySelectorAll(".tab");
    const loginForm = document.getElementById("loginForm");
    const registerForm = document.getElementById("registerForm");

    function showForm(type) {
      tabs.forEach(tab => tab.classList.remove("active"));

      if (type === "login") {
        tabs[0].classList.add("active");
        loginForm.classList.add("active");
        registerForm.classList.remove("active");
      } else {
        tabs[1].classList.add("active");
        registerForm.classList.add("active");
        loginForm.classList.remove("active");
      }
    }

    loginForm.addEventListener("submit", function (e) {
      e.preventDefault();
      alert("这是静态示例页面，登录功能需要后端支持。");
    });

    registerForm.addEventListener("submit", function (e) {
      e.preventDefault();

      const password = document.getElementById("registerPassword").value;
      const confirmPassword = document.getElementById("confirmPassword").value;

      if (password !== confirmPassword) {
        alert("两次输入的密码不一致。");
        return;
      }

      alert("这是静态示例页面，注册功能需要后端支持。");
    });
  </script>

</body>
</html>
